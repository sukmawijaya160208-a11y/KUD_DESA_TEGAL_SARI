name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    concurrency:
      group: vps-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build & Deploy
        working-directory: /var/www/kud
        run: |
          git fetch origin main
          git reset --hard origin/main
          docker compose up -d --build
          echo "=== Deploy selesai ==="
