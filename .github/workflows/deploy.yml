name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    concurrency:
      group: vps-deploy
      cancel-in-progress: false

    steps:
      - name: Test script execution
        run: bash /opt/actions-runner/test.sh
