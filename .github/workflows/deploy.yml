name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: vps-deploy
      cancel-in-progress: false

    steps:
      - name: Test connectivity
        run: |
          ping -c 3 ${{ secrets.VPS_HOST }} || true
          nc -zv -w5 ${{ secrets.VPS_HOST }} ${{ secrets.VPS_PORT }} || true

      - name: Deploy via SSH
        run: |
          apt-get update -qq && apt-get install -y -qq sshpass 2>/dev/null
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /var/www/kud && git pull origin main && git checkout -- docker-compose.yml && docker compose up -d --build && docker exec kud-backend php artisan migrate --force && echo '=== DEPLOY SELESAI ==='"
