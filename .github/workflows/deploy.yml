name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: vps-deploy
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: |
            WORK_DIR=/var/www/kud
          script: |
            set -e

            cd "$WORK_DIR"

            git pull origin main

            git checkout -- docker-compose.yml

            docker compose build
            docker compose up -d

            docker exec kud-backend php artisan migrate --force
            docker exec kud-backend php artisan optimize:clear

            echo "=== DEPLOY SELESAI ==="
