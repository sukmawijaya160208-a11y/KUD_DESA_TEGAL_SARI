name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    concurrency:
      group: vps-deploy
      cancel-in-progress: false

    steps:
      - name: Cek direktori & env
        run: |
          pwd
          ls -la /var/www/kud/.git/HEAD
          whoami
          id
          echo "PATH=$PATH"
          which git
      - name: Build & Deploy
        run: |
          cd /var/www/kud
          git fetch origin main
          git reset --hard origin/main
          docker compose up -d --build
          echo "=== Deploy selesai ==="
