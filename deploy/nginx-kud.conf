# === KUD Desa Sari Subur — Nginx Config ===
# Letak: /etc/nginx/sites-available/kud-sari-subur.my.id
# Aktifkan: ln -s /etc/nginx/sites-available/kud-sari-subur.my.id /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name kud-sari-subur.my.id www.kud-sari-subur.my.id;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kud-sari-subur.my.id www.kud-sari-subur.my.id;

    # === SSL (Let's Encrypt) ===
    ssl_certificate /etc/letsencrypt/live/kud-sari-subur.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kud-sari-subur.my.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # === Security Headers ===
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root project
    root /var/www/kud;

    # === Logs ===
    access_log /var/log/nginx/kud-access.log;
    error_log /var/log/nginx/kud-error.log;

    # === Backend API ===
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Body size for file uploads (20MB max)
        client_max_body_size 20m;
    }

    # === Backend Storage (served langsung dari Laravel storage) ===
    location /storage/ {
        alias /var/www/kud/backend/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # Biar kalo file gak ada, fallback ke Laravel
        try_files $uri @laravel_storage;
    }

    # === Backend via PHP-FPM (alternatif: kalo pake artisan serve, proxy ini gak perlu) ===
    # Kalo mau pake PHP-FPM langsung, uncomment ini dan ganti proxy di /api/
    # location ~ ^/(api|storage)/ {
    #     try_files $uri /backend/public/index.php?$query_string;
    # }
    # location ~ \.php$ {
    #     fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
    #     fastcgi_param SCRIPT_FILENAME /var/www/kud/backend/public$fastcgi_script_name;
    #     include fastcgi_params;
    #     fastcgi_read_timeout 60s;
    #     client_max_body_size 20m;
    # }

    # === Backend fallback (kalau file gak ada di storage) ===
    location @laravel_storage {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Frontend (Next.js) ===
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # WebSocket support (Next.js HMR, future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # === Next.js static files (cache lama) ===
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # === Block akses ke file sensitif ===
    location ~ /\.(env|git|htaccess|DS_Store|composer|npmrc|node_modules) {
        deny all;
        return 404;
    }
}
